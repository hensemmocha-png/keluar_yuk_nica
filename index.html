<!DOCTYPE html>
<html>
<head>
<title>For You ❤️</title>
<style>
body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
flex-direction:column;
font-family:sans-serif;
background:pink;
}
button{
padding:12px 25px;
margin:10px;
border:none;
border-radius:12px;
font-size:20px;
cursor:pointer;
position:relative;
}
#yes{
background:#ff4d88;
color:white;
}
#no{
background:white;
}
</style>
</head>

<body>

<h1>Awak nak keluar dengan saya? 🥺</h1>

<button id="yes" onclick="alert('YAYYY ❤️')">Yes</button>
<button id="no">No</button>

<script>
const noBtn = document.getElementById("no");

noBtn.addEventListener("mouseover", () => {
noBtn.style.position = "absolute";
noBtn.style.left = Math.random() * 80 + "%";
noBtn.style.top = Math.random() * 80 + "%";
});
</script>

</body>
</html>
